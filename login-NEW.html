<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Portal - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1A1A1A;
            color: #E0E0E0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo-container svg {
            width: 160px;
            height: auto;
        }

        .login-card {
            background: #2A2A2A;
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            color: #FFFFFF;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: #CCC;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 0.875rem 1rem;
            font-size: 1rem;
            border: 1px solid #3A3A3A;
            border-radius: 6px;
            background: #1A1A1A;
            color: #E0E0E0;
            transition: border-color 0.2s;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #E60A00;
        }

        .btn-primary {
            width: 100%;
            padding: 0.875rem;
            font-size: 1rem;
            font-weight: 600;
            color: #FFFFFF;
            background: #E60A00;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: #C00900;
        }

        .btn-primary:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .error-message {
            background: rgba(230, 10, 0, 0.15);
            border-left: 3px solid #E60A00;
            padding: 0.875rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .loading {
            text-align: center;
            padding: 1rem;
            color: #999;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-container">
            <svg viewBox="0 0 315.39 179.63" xmlns="http://www.w3.org/2000/svg">
                <path d="M60.12,0V76.43H0V0H60.12ZM30.06,135.95c16.61,0,30.06,13.45,30.06,30.06s-13.45,30.06-30.06,30.06S0,182.62,0,166.01s13.45-30.06,30.06-30.06Z" fill="#0a0909" stroke="#0a0909" stroke-width="2"/>
                <path d="M60.12,103.2V76.43H0v26.77H60.12Z" fill="#e60a00"/>
                <path d="M104.5,0V179.63h47.64V0h-47.64Z" fill="#0a0909" stroke="#0a0909" stroke-width="2"/>
                <path d="M198.56,0V179.63h47.64V103.2h69.19V56.43h-69.19V0h-47.64Z" fill="#0a0909" stroke="#0a0909" stroke-width="2"/>
            </svg>
        </div>

        <div class="login-card">
            <h1>Employee Portal</h1>
            <p class="subtitle">Sign in to access your dashboard</p>

            <div id="errorMessage" class="error-message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn-primary" id="loginBtn">
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <script>
        // Supabase configuration
        const SUPABASE_URL = 'https://ftzpjtvyrnnjjcvrtsab.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0enBqdHZ5cm5uampjdnJ0c2FiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjIxNjYsImV4cCI6MjA5MTIzODE2Nn0.2mzFoPtaT2grtUJ46KjU0dQbA1Yp0kyRiv-HP6KJm-g';
        
        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');

        // Initialize Supabase client
        let supabase;
        
        function showError(message) {
            console.log('Showing error:', message); // Debug log
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        function hideError() {
            errorMessage.classList.remove('show');
            errorMessage.textContent = '';
        }

        // Initialize app
        async function initializeApp() {
            try {
                // Check if Supabase SDK is loaded
                if (typeof window.supabase === 'undefined') {
                    showError('Failed to load Supabase SDK. Please refresh the page.');
                    return;
                }

                // Create Supabase client
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                
                // Check if the API key is still a placeholder
                if (SUPABASE_ANON_KEY.includes('YOUR_ACTUAL_KEY_HERE') || SUPABASE_ANON_KEY.length < 100) {
                    showError('⚠️ Configuration Error: Please replace SUPABASE_ANON_KEY with your actual Supabase anon key. See README.md for instructions.');
                    loginBtn.disabled = true;
                    return;
                }

                // Check if already logged in
                const { data: { session }, error: sessionError } = await supabase.auth.getSession();
                
                if (sessionError) {
                    console.error('Session check error:', sessionError);
                    showError('Unable to verify session. Please check your internet connection.');
                    return;
                }
                
                if (session) {
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                console.error('Initialization error:', error);
                showError(`Initialization failed: ${error.message}`);
            }
        }

        // Handle form submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            e.stopPropagation(); // Extra safety to prevent default form submission
            
            hideError();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            // Validation
            if (!email || !password) {
                showError('Please enter both email and password.');
                return;
            }

            if (!supabase) {
                showError('Application not initialized. Please refresh the page.');
                return;
            }

            // Disable button and show loading state
            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';

            try {
                console.log('Attempting login for:', email); // Debug log
                
                // Attempt sign in
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    console.error('Auth error:', error);
                    throw error;
                }

                if (!data || !data.user) {
                    throw new Error('Login succeeded but no user data returned');
                }

                console.log('Login successful, fetching profile...'); // Debug log

                // Get user profile to check role and status
                const { data: profile, error: profileError } = await supabase
                    .from('user_profiles')
                    .select('role, full_name, organization_id, department_id, is_active')
                    .eq('id', data.user.id)
                    .single();

                if (profileError) {
                    console.error('Profile fetch error:', profileError);
                    throw new Error(`Failed to load user profile: ${profileError.message}`);
                }

                if (!profile) {
                    await supabase.auth.signOut();
                    throw new Error('User profile not found. Please contact your administrator.');
                }

                if (!profile.is_active) {
                    await supabase.auth.signOut();
                    throw new Error('Your account has been deactivated. Please contact your administrator.');
                }

                console.log('Profile loaded, storing user info...'); // Debug log

                // Store user info in localStorage
                localStorage.setItem('user_role', profile.role);
                localStorage.setItem('user_name', profile.full_name);
                localStorage.setItem('user_org_id', profile.organization_id);
                localStorage.setItem('user_dept_id', profile.department_id || '');
                localStorage.setItem('user_id', data.user.id);

                // Redirect to dashboard
                console.log('Redirecting to dashboard...'); // Debug log
                window.location.href = 'dashboard.html';

            } catch (error) {
                console.error('Login error:', error);
                
                // Show user-friendly error message
                let errorMsg = 'Login failed. Please try again.';
                
                if (error.message) {
                    if (error.message.includes('Invalid login credentials')) {
                        errorMsg = 'Invalid email or password. Please check your credentials and try again.';
                    } else if (error.message.includes('Email not confirmed')) {
                        errorMsg = 'Please confirm your email address before logging in.';
                    } else if (error.message.includes('network') || error.message.includes('fetch')) {
                        errorMsg = 'Network error. Please check your internet connection.';
                    } else {
                        errorMsg = error.message;
                    }
                }
                
                showError(errorMsg);
                
                // Re-enable button
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        });

        // Start initialization when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeApp);
        } else {
            initializeApp();
        }
    </script>
</body>
</html>
